name: teamnova
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  volume_watcher: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assest/App Icon .jpeg"

flutter:
  uses-material-design: true

  # ==========================================
  # ASSETS CONFIGURATION
  # ==========================================
  # Every path here matches your physical folder: C:\Women Transport\teamnova\assest
  assets:
    - assest/blue colour.png
    - assest/ID CARD.JPG
    - assest/QR Design.png

  # ==========================================
  # FONTS CONFIGURATION (DISABLED)
